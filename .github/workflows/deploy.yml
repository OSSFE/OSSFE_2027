name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Regenerate the sponsor prospectus PDF from sponsors.json before the
      # Astro build so it is picked up from public/ (pin Typst to match local).
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.15.0"

      - name: Build sponsor prospectus PDF
        run: npm run prospectus
      
      - name: Build CFP flyer
        run: npm run cfp-prospectus

      - uses: withastro/action@v3
        with:
          node-version: 22   # installs deps, builds, uploads artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4